# .goreleaser.yml
project_name: gen
before:
  hooks:
    - go mod tidy
builds:
  - id: gen
    binary: gen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
archives:
  - id: gen
    builds:
      - gen
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if not (eq .Os "") }}{{ .Os | title }}_
      {{- end }}{{ if not (eq .Arch "") }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
release:
  github:
    owner: aminshahid573
    name: gen
  name_template: '{{ .Version }}'
  draft: false
  prerelease: false
brews:
  - name: gen
    tap:
      owner: aminshahid573
      name: homebrew-gen
      directory: Formula