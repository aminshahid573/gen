# .goreleaser.yml
version: 2
project_name: gen
before:
  hooks:
    - go mod tidy
builds:
  - binary: gen
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - 386
      - amd64
      - arm
      - arm64
    goarm:
      - 6
      - 7

archives:
  - format_overrides:
      - goos: windows
        formats: ['zip']

release:
  name_template: "{{.ProjectName}}-v{{.Version}}"

brews:
  - repository:
      owner: aminshahid573
      name: homebrew-gen
    commit_author:
      name: Shahid Amin
      email: createa557733@gmail.com
    homepage: https://github.com/aminshahid573/gen
    description: A Swiss Army knife CLI tool for developers, packed with useful utilities for daily tasks.